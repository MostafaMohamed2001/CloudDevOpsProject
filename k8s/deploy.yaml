apiVersion: apps/v1
kind: Deployment

metadata:
  name: python-app
  namespace: ivolve

spec:
  replicas: 2

  selector:
    matchLabels:
      app: python

  template:
    metadata:
      labels:
        app: python

    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - python
              topologyKey: kubernetes.io/hostname

      containers:
        - name: python
          image: 114522856449.dkr.ecr.eu-central-1.amazonaws.com/cloud-devops-app:1.0.0

          ports:
            - containerPort: 3500