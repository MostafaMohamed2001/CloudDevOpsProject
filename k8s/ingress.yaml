apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: python-ingress
  namespace: ivolve

spec:
  ingressClassName: nginx

  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix

            backend:
              service:
                name: python-service
                port:
                  number: 80